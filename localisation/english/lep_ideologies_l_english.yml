 #PATERNALISM
 paternalism:0 "Paternalist"
 paternalism_noun:0 "Paternalism"
 paternalism_desc:0 "Authoritarian State"
 paternalistic_conservatism:0 "Paternalist Conservative"
 paternalistic_conservatism_noun:0 "Paternalist Conservatism"
 paternalistic_conservatism_desc:0 "Paternalistic Conservatism is a political ideology that combines elements of conservatism and paternalism. It emphasizes the importance of maintaining social order and hierarchy, while also advocating for the protection and welfare of the population through a strong, guiding state."
 paternalistic_progressivism:0 "Paternalist Progressive"
 paternalistic_progressivism_noun:0 "Paternalist Progressivism"
 paternalistic_progressivism_desc:0 "Paternalistic Progressivism is a political ideology that combines elements of progressivism and paternalism. It emphasizes the importance of social reform and modernization, while also advocating for a strong, guiding state to protect and promote the welfare of the population."
 paternalistic_liberalism:0 "Paternalist Liberal"
 paternalistic_liberalism_noun:0 "Paternalist Liberalism"
 paternalistic_liberalism_desc:0 "Paternalistic Liberalism is a political ideology that combines elements of liberalism and paternalism. It emphasizes the importance of individual freedom and social justice, while also advocating for a strong, guiding state to protect and promote the welfare of the population."
 one_nation_conservatism:0 "One Nation Conservative"
 one_nation_conservatism_noun:0 "One Nation Conservatism"
 one_nation_conservatism_desc:0 "One Nation Conservatism is a political ideology originating from the United Kingdom that emphasizes the importance of social cohesion and national unity. It advocates for a society where the government plays a role in addressing social inequalities and promoting the welfare of all citizens, while also preserving traditional values and institutions. One Nation Conservatives believe in a strong central government that can effectively implement policies to benefit the working class and reduce the influence of wealthy elites, while also promoting a sense of national identity and solidarity."
 prussian_socialism:0 "Prussian Socialist"
 prussian_socialism_noun:0 "Prussian Socialism"
 prussian_socialism_desc:0 "Prussian Socialism is a political ideology that was meant to subvert the growing popularity of socialism in Germany by combining elements of socialism with Prussian militarism and authoritarianism. It emphasizes the importance of a strong, centralized state to guide the development of society and promote national unity, while also advocating for social welfare policies to address social inequalities and promote economic growth."
 progressive_conservatism_pate:0 "Progressive Conservative"
 progressive_conservatism_pate_noun:0 "Progressive Conservatism"
 progressive_conservatism_pate_desc:0 "Progressive Conservatism is a political ideology that combines elements of progressivism and conservatism. It emphasizes the importance of social reform and modernization, while also advocating for a strong, guiding state to protect and promote the welfare of the population, while maintaining continuity with traditional values and institutions."
 agrarian_paternalism:0 "Agrarian Paternalist"
 agrarian_paternalism_noun:0 "Agrarian Paternalism"
 agrarian_paternalism_desc:0 "Agrarian Paternalism is a political ideology that combines elements of agrarianism and paternalism. It emphasizes the importance of agriculture and rural communities in achieving social and economic goals, while also advocating for a strong, guiding state to protect and promote the welfare of the population in these areas."
 eccelesiastical_paternalism:0 "Ecclesiastical Paternalist"
 eccelesiastical_paternalism_noun:0 "Ecclesiastical Paternalism"
 eccelesiastical_paternalism_desc:0 "Ecclesiastical Paternalism is a political ideology that combines elements of religious authority and paternalism. It emphasizes the importance of religious institutions and values in guiding society, while also advocating for a strong, guiding state to protect and promote the welfare of the population in accordance with religious principles."
 paternal_autocracy:0 "Paternal Autocratic"
 paternal_autocracy_noun:0 "Paternal Autocracy"
 paternal_autocracy_desc:0 "Paternal Autocracy is a political ideology that combines elements of autocracy and paternalism. It emphasizes the importance of a strong, centralized authority to guide and protect the population, while also advocating for policies that promote social welfare and address social inequalities. Paternal Autocrats believe in a society where the government takes an active role in ensuring the well-being of its citizens, while also maintaining strict control over political and social life."
