 military_junta:0 "Military Junta"
 military_junta_noun:0 "Military Junta"
 military_junta_desc:0 "Military Junta is a political ideology that emphasizes the role of the military in governing a country. It advocates for a government led by military leaders, often through a coup d'état, and typically involves the suspension of democratic processes and civil liberties. Military Juntas often justify their rule as necessary to restore order and stability, but they are often criticized for their authoritarian nature and human rights abuses."
