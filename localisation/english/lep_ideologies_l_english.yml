l_english:
 #LEFTCOM
 left_communism:0 "Left Communist"
 left_communism_noun:0 "Left Communism"
 left_communism_adj:0 "Left Communist"
 left_communism_desc:0 "Transitionary Socialist State"
 luxemburgism:0 "Luxemburgist"
 luxemburgism_noun:0 "Luxemburgism"
 luxemburgism_desc:0 "Luxemburgism is a political ideology based on the ideas of Rosa Luxemburg, a Marxist theorist and revolutionary. It emphasizes the importance of mass action and spontaneous uprisings by the working class to achieve socialism. Luxemburgists criticize the idea of a vanguard party and instead advocate for a more democratic and decentralized approach to revolution. They believe that the working class should have direct control over the means of production and that the state should be abolished in favor of a stateless, classless society. Luxemburgism also emphasizes the importance of international solidarity and the need for workers around the world to unite in their struggle against capitalism."
 orthodox_bordigism:0 "Bordigist"
 orthodox_bordigism_noun:0 "Bordigism"
 orthodox_bordigism_desc:0 "Bordigism is a political ideology based on the ideas of Amadeo Bordiga, an Italian Marxist theorist and revolutionary. Bordigists advocate for a strict adherence to Marxist principles and reject any form of revisionism or compromise with capitalist systems. They believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be abolished in favor of a stateless, classless society. Bordigism emphasizes the importance of a vanguard party to lead the revolution and maintain the purity of Marxist ideology. Bordigists often criticize other forms of communism for being too reformist and for compromising with capitalist systems."
 roman_spartacism:0 "Roman Spartacist"
 roman_spartacism_noun:0 "Roman Spartacism"
 council_communism:0 "Council Communist"
 council_communism_noun:0 "Council Communism"
 council_communism_desc:0 "Council Communism is a political ideology that emphasizes the role of workers' councils in the revolutionary process. Council Communists believe that the working class should take control of the means of production through direct action and self-management, rather than through a vanguard party. They advocate for a stateless, classless society and reject the idea of a transitional state. Council Communism emphasizes the importance of grassroots organizing and the need for workers to have direct control over their labor and the economy."
 abstentionism:0 "Abstentionist"
 abstentionism_noun:0 "Abstentionism"
 abstentionism_desc:0 "Abstentionism is a political ideology that advocates for the refusal to participate in electoral politics or other forms of political engagement. Abstentionists believe that the political system is inherently flawed and that participating in it only serves to legitimize and perpetuate existing power structures. They argue that true social change can only be achieved through direct action and grassroots organizing, rather than through voting or other forms of political participation. Abstentionism can take many forms, from simply refusing to vote to actively boycotting elections and other political events."
 orthodox_marxism:0 "Orthodox Marxist"
 orthodox_marxism_noun:0 "Orthodox Marxism"
 orthodox_marxism_desc:0 "Orthodox Marxism is a political ideology that adheres strictly to the original principles of Marxism as formulated by Karl Marx and Friedrich Engels. Orthodox Marxists emphasize the importance of class struggle, the dictatorship of the proletariat, and the eventual establishment of a classless, stateless society. They often criticize revisions or adaptations of Marxist theory that they believe dilute its revolutionary potential."
 de_leonism:0 "De Leonist"
 de_leonism_noun:0 "De Leonism"
 zapatismo:0 "Zapatist"
 zapatismo_noun:0 "Zapatismo"
 zapatismo_desc:0 "Zapatismo is a political ideology based on the ideas and actions of Emiliano Zapata, a Mexican revolutionary leader. Zapatismo emphasizes the importance of land reform, indigenous rights, and social justice. Zapatistas advocate for a society where the land is owned collectively by the people and where indigenous communities have autonomy and control over their own affairs. They also emphasize the importance of grassroots organizing and direct action in achieving social change, and reject the idea of a vanguard party or centralized authority. Zapatismo has been influential in various social movements around the world, particularly those focused on indigenous rights and land reform."
 FACTION_NAME_LEFT_COMMUNISM_1:0 "$CONTINENT_ADJ$ Worker's Council"
 FACTION_NAME_LEFT_COMMUNISM_2:0 "Fourth Internationale"
 #AUTHSOC
 authsoc:0 "Authoritarian Socialist"
 authsoc_noun:0 "Authoritarian Socialism"
 authsoc_adj:0 "Authoritarian Socialist"
 authsoc_desc:0 "Socialist Party State"
 vanguardism_authsoc:0 "Vanguardist"
 vanguardism_authsoc_noun:0 "Vanguardism"
 vanguardism_authsoc_desc:0 "Vanguardism is a political ideology that emphasizes the role of a vanguard party in leading the revolutionary struggle to achieve socialism or communism. Vanguardists believe that a small, dedicated group of revolutionaries should take control of the means of production and guide the working class towards a stateless, classless society. They argue that the working class may not be able to achieve revolution on its own and that a vanguard party is necessary to provide leadership and direction. Vanguardism often involves a centralized, authoritarian approach to governance and has been criticized for leading to authoritarian regimes and suppressing individual freedoms."
 revolutionary_centralism:0 "Revolutionary Centralist"
 revolutionary_centralism_noun:0 "Revolutionary Centralism"
 revolutionary_centralism_desc:0 "Revolutionary Centralism is a political ideology that combines elements of centralism and revolutionary socialism. It emphasizes the need for a strong, centralized party to lead the revolutionary struggle and to maintain discipline and unity within the movement. Revolutionary Centralists believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be used as a tool to achieve socialist goals."
 state_syndicalism:0 "State Syndicalist"
 state_syndicalism_noun:0 "State Syndicalism"
 state_syndicalism_desc:0 "State Syndicalism is a political ideology that combines elements of syndicalism and state socialism. It emphasizes the role of the state in guiding the transition to socialism while also advocating for workers' control over the means of production through syndicalist principles. State Syndicalists believe that the state should play a central role in coordinating economic activity and ensuring social welfare, while also allowing for worker self-management and direct control over their labor."
 council_dictatorship:0 "Council Dictatorship"
 council_dictatorship_noun:0 "Council Dictatorship"
 council_dictatorship_desc:0 "Council Dictatorship is a political ideology that combines elements of council communism and authoritarian socialism. It emphasizes the role of workers' councils in the revolutionary process while also advocating for a strong, centralized state to guide the transition to socialism. Council Dictatorship advocates for a stateless, classless society but believes that a transitional state is necessary to achieve this goal. Critics argue that Council Dictatorship can lead to authoritarianism and the suppression of individual freedoms, while proponents argue that it provides a necessary framework for achieving socialist goals."
 technocratic_socialism:0 "Technocratic Socialist"
 technocratic_socialism_noun:0 "Technocratic Socialism"
 technocratic_socialism_desc:0 "Technocratic Socialism is a political ideology that emphasizes the role of technology and scientific management in achieving socialism. Technocratic Socialists believe that a strong, centralized state should use technology and scientific principles to guide economic planning and social organization. They argue that technological advancements can help to create a more efficient and equitable society, but also recognize the potential for technology to be used as a tool of oppression if not properly managed. Technocratic Socialism advocates for a society where technology is used to improve the lives of all people, while also ensuring that it is not used to concentrate power in the hands of a few."
 militarized_socialism:0 "Militarized Socialist"
 militarized_socialism_noun:0 "Militarized Socialism"
 militarized_socialism_desc:0 "Militarized Socialism is a political ideology that emphasizes the role of the military in achieving socialist goals. Militarized Socialists believe that a strong, centralized state should use military power to guide the transition to socialism and to defend the revolution against internal and external threats. They argue that the military can play a crucial role in maintaining order and stability during the revolutionary process, but also recognize the potential for militarization to lead to authoritarianism and the suppression of individual freedoms."
 bolshevism_authsoc:0 "Bolshevik"
 bolshevism_authsoc_noun:0 "Bolshevism"
 bolshevism_authsoc_desc:0 "Bolshevism is a political ideology that combines elements of authoritarian socialism and revolutionary communism. It emphasizes the role of a vanguard party in leading the revolutionary struggle to achieve socialism or communism, while also advocating for a strong, centralized state to guide the transition to socialism. Bolsheviks believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be used as a tool to achieve socialist goals, and eventually, communism."
 trotskyism:0 "Trotskyist"
 trotskyism_noun:0 "Trotskyism"
 trotskyism_desc:0 "Trotskyism is a political ideology based on the ideas of Leon Trotsky, a Marxist theorist and revolutionary. It emphasizes the importance of international revolution and the need for a permanent revolution to achieve socialism and communism. Trotskyists believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be used as a tool to achieve socialist goals, and eventually, communism."
 red_federalism:0 "Red Federalist"
 red_federalism_noun:0 "Red Federalism"
 red_federalism_desc:0 "Red Federalism is a political ideology that combines elements of federalism and socialism. It emphasizes the importance of decentralized governance and local autonomy, while also advocating for collective ownership and control of the means of production. Red Federalists believe that a strong, centralized state can be oppressive and that power should be distributed among local communities and workers' councils. They argue that a more equitable distribution of wealth and resources is necessary to achieve social justice and economic equality, while also recognizing the importance of individual freedoms and market mechanisms in promoting economic growth and innovation."
 war_communism:0 "War Communist"
 war_communism_noun:0 "War Communism"
 war_communism_desc:0 "War Communism is a political ideology that combines elements of authoritarian socialism and revolutionary communism, with a specific focus on the conditions of war. It emphasizes the need for a strong, centralized state to guide the transition to socialism and to mobilize resources for the war effort. War Communists believe that the state should have extensive control over the economy and society during times of conflict, prioritizing the needs of the war effort over individual freedoms and market mechanisms."
 democratic_red_caesarism:0 "Democratic Red Caesarist"
 democratic_red_caesarism_noun:0 "Democratic Red Caesarism"
 democratic_red_caesarism_desc:0 "Democratic Red Caesarism is a more libertarian variant of Red Caesarism that emphasizes the importance of democratic processes and individual freedoms, while still advocating for a strong, centralized state to guide the transition to socialism. Democratic Red Caesarists believe that a vanguard party should lead the revolutionary struggle to achieve socialism or communism, but also recognize the need for democratic accountability and the protection of individual rights. They argue that a more democratic approach to governance can help to prevent authoritarianism and promote true social justice, while still achieving socialist goals."
 american_syndicalism:0 "American Syndicalist"
 american_syndicalism_noun:0 "American Syndicalism"
 american_syndicalism_desc:0 "American Syndicalism is a mix of state syndicalist ideology and industrial unionism. Championed by William Z. Foster, American Syndicalism emphasizes the role of labor unions and workers' organizations in achieving socialism, while also advocating for the use of state power to guide the transition to socialism. American Syndicalists believe that the working class should take control of the means of production through direct action and self-management, while also recognizing the potential benefits of state intervention in promoting social welfare and economic equality. They advocate for a stateless, classless society where workers have direct control over their labor and the economy, while also allowing for some degree of state involvement in guiding the transition to socialism."
 FACTION_NAME_AUTHSOC_1:0 "Third Internationale"
 #SYNDICALIST
 syndicalism:0 "Syndicalist"
 syndicalism_noun:0 "Syndicalism"
 syndicalism_adj:0 "Syndicalist"
 syndicalism_desc:0 "Union-Led State"
 revolutionary_syndicalism:0 "Revolutionary Syndicalist"
 revolutionary_syndicalism_noun:0 "Revolutionary Syndicalism"
 revolutionary_syndicalism_desc:0 "Revolutionary Syndicalism is a political ideology that combines elements of syndicalism and revolutionary socialism. It emphasizes the role of labor unions and workers' organizations in leading the revolutionary struggle to achieve socialism or communism. Revolutionary Syndicalists believe that the working class should take control of the means of production through direct action and self-management, while also advocating for a strong, centralized party to provide leadership and direction during the revolutionary process."
 reformist_syndicalism:0 "Reformist Syndicalist"
 reformist_syndicalism_noun:0 "Reformist Syndicalism"
 reformist_syndicalism_desc:0 "Reformist Syndicalism is a political ideology that combines elements of syndicalism and reformism. It emphasizes the role of labor unions and workers' organizations in advocating for reforms within the capitalist system, rather than seeking to overthrow it through revolution. Reformist Syndicalists believe that the working class can achieve better conditions and greater control over their labor through collective bargaining and political activism, rather than through direct action and self-management. They advocate for a more gradual transition to socialism, rather than an immediate establishment of a stateless, classless society."
 industrial_unionism:0 "Industrial Unionist"
 industrial_unionism_noun:0 "Industrial Unionism"
 industrial_unionism_desc:0 "Industrial Unionism is a political ideology that emphasizes the role of industrial unions in achieving socialism. Industrial Unionists believe that the working class should take control of the means of production through direct action and self-management, rather than through a vanguard party or state control. They advocate for a stateless, classless society and reject the idea of a transitional state. Industrial Unionism emphasizes the importance of grassroots organizing and the need for workers to have direct control over their labor and the economy."
 market_syndicalism:0 "Market Syndicalist"
 market_syndicalism_noun:0 "Market Syndicalism"
 market_syndicalism_desc:0 "Market Syndicalism is a political ideology that combines elements of syndicalism and market socialism. It emphasizes the role of labor unions and workers' organizations in achieving socialism, while also advocating for the use of market mechanisms to allocate resources and coordinate economic activity. Market Syndicalists believe that the working class should take control of the means of production through direct action and self-management, while also recognizing the potential benefits of market competition in promoting efficiency and innovation. They advocate for a stateless, classless society where workers have direct control over their labor and the economy, while also allowing for some degree of market interaction."
 FACTION_NAME_SYNDICALISM_1:0 "International Workers' Association"
 FACTION_NAME_SYNDICALISM_2:0 "International Labor Alliance"
 FACTION_NAME_SYNDICALISM_3:0 "Syndicalist International"
 FACTION_NAME_SYNDICALISM_4:0 "Worker's International Congress"
 FACTION_NAME_SYNDICALISM_5:0 "The Workers' Commonwealth"
 #RADDEM
 radical_democracy:0 "Radical Democracy"
 radical_democracy_noun:0 "Radical Democracy"
 radical_democracy_adj:0 "Radical Democratic"
 radical_democracy_desc:0 "Democratic State"
 mussolinism:0 "Mussolinist"
 mussolinism_noun:0 "Mussolinism"
 mussolinism_desc:0 "Mussolinism is a political ideology based on the ideas and policies of Benito Mussolini, the founder of the Surreal Federation of Italy. It emphasizes a mix of personal freedom, social welfare, and loyalty to the republic. It also promotes militarism and the idea of national unity through strength."
 national_socialism:0 "National Socialist"
 national_socialism_noun:0 "National Socialism"
 national_socialism_desc:0 "National Socialism, better known as nationalist social democracy, is a political ideology that combines elements of nationalism and social democracy. It emphasizes the importance of national identity and unity, while also advocating for social welfare policies and economic interventionism to address social inequalities."
 Technocracy:0 "Technocratic"
 Technocracy_noun:0 "Technocracy"
 Technocracy_desc:0 "Technocracy is a form of government where power is held by technical experts and scientists rather than elected officials. It emphasizes the use of scientific and technical knowledge in decision-making processes."
 new_way_anarchism:0 "New Way Anarchist"
 new_way_anarchism_noun:0 "New Way Anarchism"
 new_way_anarchism_desc:0 "The State Rights Party follows the principles of New Way Anarchism, a political ideology that confederates power so decentrally that power is effectively non-existent. New Way Anarchists reject the centralized state, but prioritize the individual more than anything else."
 longism:0 "Longist"
 longism_noun:0 "Longism"
 longism_desc:0 "Longism is a political ideology spearheaded by and based on the ideas of Huey Long. Longism emphasizes populism, economic interventionism, and social welfare policies to address social inequalities and promote economic growth. Longists advocate for a strong central government that can effectively implement policies to benefit the working class and reduce the influence of wealthy elites."
 fusion_liberalism:0 "Fusion Liberal"
 fusion_liberalism_noun:0 "Fusion Liberalism"
 fusion_liberalism_desc:0 "Fusion Liberalism is a political ideology that combines elements of liberalism and other ideologies to create a more comprehensive approach to governance and social organization."
 red_liberalism:0 "Red Liberal"
 red_liberalism_noun:0 "Red Liberalism"
 red_liberalism_desc:0 "Red Liberalism, better known as Liberal Socialism, is a political ideology that combines elements of liberalism and socialism to create a more comprehensive approach to governance and social organization."
 red_conservatism:0 "Red Conservative"
 red_conservatism_noun:0 "Red Conservatism"
 red_conservatism_desc:0 "Red Conservatism, better known as conservative socialism, is a political ideology that combines elements of conservatism and socialism to create a more comprehensive approach to governance and social organization."
 orange_centrism:0 "Orange Centrist"
 orange_centrism_noun:0 "Orange Centrism"
 orange_centrism_desc:0 "Orange Centrism is a political ideology that combines elements of centrism and other ideologies to create a more comprehensive approach to governance and social organization."
 national_populism:0 "National Populist"
 national_populism_noun:0 "National Populism"
 national_populism_desc:0 "National Populism is a political ideology that emphasizes the interests of the nation and its people, often through populist rhetoric and policies."
 reformist_syndicalism_raddem:0 "Reformist Syndicalist"
 reformist_syndicalism_raddem_noun:0 "Reformist Syndicalism"
 reformist_syndicalism_raddem_desc:0 "Reformist Syndicalism is a political ideology that combines elements of syndicalism and reformism. It emphasizes the role of labor unions and workers' organizations in advocating for reforms within the capitalist system, rather than seeking to overthrow it through revolution. Reformist Syndicalists believe that the working class can achieve better conditions and greater control over their labor through collective bargaining and political activism, rather than through direct action and self-management. They advocate for a more gradual transition to socialism, rather than an immediate establishment of a stateless, classless society."
 industrial_unionism_raddem:0 "Industrial Unionist"
 industrial_unionism_raddem_noun:0 "Industrial Unionism"
 industrial_unionism_raddem_desc:0 "Industrial Unionism is a political ideology that emphasizes the role of industrial unions in achieving socialism. Industrial Unionists believe that the working class should take control of the means of production through direct action and self-management, rather than through a vanguard party or state control. They advocate for a stateless, classless society and reject the idea of a transitional state. Industrial Unionism emphasizes the importance of grassroots organizing and the need for workers to have direct control over their labor and the economy."
 FACTION_NAME_RADICAL_DEMOCRACY_1:0 "The Solidarity Front"
 #ANARCHIST
 anarchism:0 "Anarchist"
 anarchism_noun:0 "Anarchism"
 anarchism_desc:0 "Stateless Society"
 christian_anarchism:0 "Christian Anarchist"
 christian_anarchism_noun:0 "Christian Anarchism"
 christian_anarchism_desc:0 "Christian Anarchism is a political ideology that combines elements of Christianity and anarchism. It emphasizes the importance of individual freedom, social justice, and non-violence, while also rejecting the authority of the state and organized religion. Christian Anarchists believe that the teachings of Jesus Christ promote a society based on love, compassion, and mutual aid, and that the state and organized religion often perpetuate systems of oppression and inequality. They advocate for a stateless society where individuals are free to live according to their own beliefs and values, while also promoting social justice and equality for all people."
 illegalism:0 "Illegalist"
 illegalism_noun:0 "Illegalism"
 illegalism_desc:0 "Illegalism is a political ideology that emphasizes the use of illegal and criminal activities as a means of achieving anarchist goals. Illegalists reject the idea of working within the legal system and instead advocate for direct action and sabotage to disrupt and undermine the state and capitalist systems. They believe that illegal activities can be a powerful tool for challenging authority and promoting social change, but also recognize the potential risks and consequences of engaging in illegal behavior."
 insurrectionary_anarchism:0 "Insurrectionary Anarchist"
 insurrectionary_anarchism_noun:0 "Insurrectionary Anarchism"
 insurrectionary_anarchism_desc:0 "Insurrectionary Anarchism is a political ideology that emphasizes the importance of spontaneous uprisings and direct action in achieving anarchist goals. Insurrectionary Anarchists reject the idea of a vanguard party or organized movement and instead advocate for decentralized, grassroots organizing and direct action to challenge authority and promote social change. They believe that insurrections can be a powerful tool for disrupting and undermining the state and capitalist systems, but also recognize the potential risks and consequences of engaging in insurrectionary behavior."
 anarcho_pacifism:0 "Anarcho-Pacifist"
 anarcho_pacifism_noun:0 "Anarcho-Pacifism"
 anarcho_pacifism_desc:0 "Anarcho-Pacifism is a political ideology that combines elements of anarchism and pacifism. It emphasizes the importance of non-violence and peaceful resistance in achieving anarchist goals. Anarcho-Pacifists reject the use of violence and aggression as a means of achieving social change, and instead advocate for peaceful protests, civil disobedience, and other forms of non-violent resistance to challenge authority and promote social justice. They believe that a stateless society can be achieved through peaceful means, and that violence only perpetuates systems of oppression and inequality."
 egoism:0 "Egoist"
 egoism_noun:0 "Egoism"
 egoism_desc:0 "Egoism is a political ideology that emphasizes the importance of individual self-interest and personal gain. Egoists believe that individuals should prioritize their own well-being and success above the needs of others or the collective good. They often reject altruistic or communal approaches to social organization, instead advocating for a society where individuals are free to pursue their own interests and goals."
 anarcho_collectivism:0 "Anarcho-Collectivist"
 anarcho_collectivism_noun:0 "Anarcho-Collectivism"
 anarcho_collectivism_desc:0 "Anarcho-Collectivism is a political ideology that combines elements of anarchism and collectivism. It emphasizes the importance of collective ownership and control of the means of production, while also rejecting the authority of the state. Anarcho-Collectivists believe that individuals should work together in cooperative communities to achieve common goals and promote social justice, while also advocating for a stateless society where individuals are free to live according to their own beliefs and values."
 mutualism:0 "Mutualist"
 mutualism_noun:0 "Mutualism"
 mutualism_desc:0 "Mutualism is a political ideology that combines elements of anarchism and socialism. It emphasizes the importance of mutual aid and cooperation in achieving social and economic equality, while also rejecting the authority of the state. Mutualists believe that individuals should work together in cooperative communities to achieve common goals and promote social justice, while also advocating for a stateless society where individuals are free to live according to their own beliefs and values."
 anarcho_communism:0 "Anarcho-Communist"
 anarcho_communism_noun:0 "Anarcho-Communism"
 anarcho_communism_desc:0 "Anarcho-Communism is a political ideology that combines elements of anarchism and communism. It emphasizes the importance of collective ownership and control of the means of production, while also rejecting the authority of the state. Anarcho-Communists believe that individuals should work together in cooperative communities to achieve common goals and promote social justice, while also advocating for a stateless society where individuals are free to live according to their own beliefs and values."
 anarcho_syndicalism:0 "Anarcho-Syndicalist"
 anarcho_syndicalism_noun:0 "Anarcho-Syndicalism"
 anarcho_syndicalism_adj:0 "Anarcho-Syndicalist"
 anarcho_syndicalism_desc:0 "Anarcho-Syndicalism is a political ideology that combines elements of anarchism and syndicalism. It emphasizes the importance of labor unions and workers' organizations in achieving social and economic equality, while also rejecting the authority of the state. Anarcho-Syndicalists believe that individuals should work together in cooperative communities to achieve common goals and promote social justice, while also advocating for a stateless society where individuals are free to live according to their own beliefs and values."
 communalist_anarchism:0 "Communalist Anarchist"
 communalist_anarchism_noun:0 "Communalist Anarchism"
 port_sovereignty:0 "Port Sovereignty Doctrine"
 port_sovereignty_noun:0 "Port Sovereignty Doctrine"
 port_sovereignty_desc:0 "The Port Sovereignty Doctrine is a system of organization that promotes horizontalism and direct democracy. Mainly popular in the former colonial islands of the world, it advocates for a mix of anarcho-syndicalism, mutualism, anarcho-communism, and piracy. For port cities, the port is organized using syndicates and anarcho-syndicalist principles, while the rest of the city is organized by anarcho-communist modes of organization. Trade between ports and cities is organized by mutualist principles, while piracy is used as a means of defense and economic disruption against imperialist and unwanted authoritarian powers."
 zapatismo_anar:0 "Zapatist"
 zapatismo_anar_noun:0 "Zapatismo"
 zapatismo_anar_desc:0 "Zapatismo is a political ideology based on the ideas and actions of Emiliano Zapata, a Mexican revolutionary leader. Zapatismo emphasizes the importance of land reform, indigenous rights, and social justice. Zapatistas advocate for a society where the land is owned collectively by the people and where indigenous communities have autonomy and control over their own affairs. They also emphasize the importance of grassroots organizing and direct action in achieving social change, and reject the idea of a vanguard party or centralized authority. Zapatismo has been influential in various social movements around the world, particularly those focused on indigenous rights and land reform."
 FACTION_NAME_ANARCHISM_1:0 "International Anarchist Congress"
 FACTION_NAME_ANARCHISM_1:0 "$CONTINENT_ADJ$ Free Territories"
 #TATSOC
 tatsoc:0 "Totalitarian Socialist"
 tatsoc_noun:0 "Totalitarian Socialism"
 tatsoc_desc:0 "Totalitarian State"
 bolshevism_tatsoc:0 "Bolshevik"
 bolshevism_tatsoc_noun:0 "Bolshevism"
 bolshevism_tatsoc_desc:0 "Bolshevism is a political ideology that combines elements of authoritarian socialism and revolutionary communism. It emphasizes the role of a vanguard party in leading the revolutionary struggle to achieve socialism or communism, while also advocating for a strong, centralized state to guide the transition to socialism. Bolsheviks believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be used as a tool to achieve socialist goals, and eventually, communism."
 left_strasserism:0 "Left Strasserist"
 left_strasserism_noun:0 "Left Strasserism"
 left_strasserism_desc:0 "Left Strasserism is a political ideology that combines elements of left-wing politics and Strasserism, a variant of National Socialism. Left Strasserists emphasize the importance of social justice, economic equality, and anti-capitalism, while also advocating for a strong, centralized state to guide the transition to socialism. They reject the racist and nationalist elements of traditional Strasserism and instead focus on creating a more inclusive and egalitarian society."
 meiji_statism:0 "Meiji Statist"
 meiji_statism_noun:0 "Meiji Statism"
 meiji_statism_desc:0 "Meiji Statism is a political ideology that combines elements of statism and Japanese nationalism and militarism, based on the principles of the Meiji Restoration. It emphasizes the importance of a strong, centralized state to guide the development of Japan and promote national unity, while also advocating for economic modernization and social reform. Meiji Statists believe that the state should play a central role in coordinating economic activity and ensuring social welfare, while also promoting traditional Japanese values and culture."
 red_caesarism:0 "Red Caesarist"
 red_caesarism_noun:0 "Red Caesarism"
 purity_vanguardism:0 "Pure Vanguardist"
 purity_vanguardism_noun:0 "Pure Vanguardism"
 purity_vanguardism_desc:0 "Pure Vanguardism is similar to Vanguardism, but emphasizes an even more centralized and authoritarian approach to governance, often utilizing purges and strict ideological conformity to maintain the purity of the revolutionary movement. Pure Vanguardists believe that a small, dedicated group of revolutionaries should have complete control over the means of production and guide the working class towards a stateless, classless, and moneyless society, while also suppressing any dissent or opposition within the movement."
 fascist_statism:0 "Fascist Statist"
 fascist_statism_noun:0 "Fascist Statism"
 fascist_statism_desc:0 "Fascist Statism is a political ideology that combines elements of fascism and statism. It emphasizes the importance of a strong, centralized state to guide the development of society and promote national unity, while also advocating for authoritarian governance and the suppression of dissent."
 vanguardism_tatsoc:0 "Vanguardist"
 vanguardism_tatsoc_noun:0 "Vanguardism"
 vanguardism_tatsoc_desc:0 "Vanguardism is a political ideology that emphasizes the role of a vanguard party in leading the revolutionary struggle to achieve socialism or communism. Vanguardists believe that a small, dedicated group of revolutionaries should take control of the means of production and guide the working class towards a stateless, classless society. They argue that the working class may not be able to achieve revolution on its own and that a vanguard party is necessary to provide leadership and direction. Vanguardism often involves a centralized, authoritarian approach to governance and has been criticized for leading to authoritarian regimes and suppressing individual freedoms."
 hamburgism_tatsoc:0 "Hamburgist"
 hamburgism_tatsoc_noun:0 "Hamburgism"
 hamburgism_tatsoc_desc:0 "Hamburgism is a political ideology that combines elements of authoritarian socialism and revolutionary communism, with a specific focus on the city of Hamburg. It emphasizes the role of a vanguard party in leading the revolutionary struggle to achieve socialism or communism, while also advocating for a strong, centralized state to guide the transition to socialism. Hamburgists believe that the working class should take control of the means of production through a revolutionary struggle and that the state should be used as a tool to achieve socialist goals, and eventually, communism. However, Hamburgism also incorporates specific cultural and historical elements of the city of Hamburg, such as its history of labor movements and its status as a major port city, into its ideology and goals."
 personalist_syndicalism_tatsoc:0 "Personalist Syndicalist"
 personalist_syndicalism_tatsoc_noun:0 "Personalist Syndicalism"
 fosterism:0 "Fosterist"
 fosterism_noun:0 "Fosterism"
 militarized_socialism_tatsoc:0 "Militarized Socialist"
 militarized_socialism_tatsoc_noun:0 "Militarized Socialism"
 FACTION_NAME_TATSOC_1:0 "Third Internationale"
 #PROGRESSIVE
 progressivism:0 "Progressive"
 progressivism_noun:0 "Progressivism"
 progressivism_desc:0 "Democratic State"
 radical_egalitarianism:0 "Radical Egalitarian"
 radical_egalitarianism_noun:0 "Radical Egalitarianism"
 radical_egalitarianism_desc:0 "Radical Egalitarianism is a political ideology that emphasizes the importance of achieving complete social and economic equality. Radical Egalitarians believe that the current systems of capitalism and social hierarchy are inherently oppressive and that a more equitable distribution of wealth and resources is necessary to achieve social justice. They advocate for policies that promote economic equality, such as progressive taxation, universal basic income, and the redistribution of wealth, while also recognizing the importance of individual freedoms and market mechanisms in promoting economic growth and innovation."
 civic_syndicalism:0 "Civic Syndicalist"
 civic_syndicalism_noun:0 "Civic Syndicalism"
 industrial_democracy:0 "Industrial Democrat"
 industrial_democracy_noun:0 "Industrial Democracy"
 industrial_democracy_desc:0 "Industrial Democracy is a political ideology that emphasizes the importance of worker participation and control in the management of industry and the economy. Industrial Democrats believe that workers should have a say in the decision-making processes of their workplaces and that they should have a greater degree of control over their labor and the means of production. They advocate for policies that promote worker ownership and control, such as cooperatives and employee stock ownership plans, while also recognizing the importance of market mechanisms in promoting economic growth and innovation."
 agrarian_socialism:0 "Agrarian Socialist"
 agrarian_socialism_noun:0 "Agrarian Socialism"
 agrarian_socialism_desc:0 "Agrarian Socialism is a political ideology that combines elements of socialism and agrarianism. It emphasizes the importance of agriculture and rural communities in achieving socialist goals. Agrarian Socialists believe that the working class should take control of the means of production through direct action and self-management, while also advocating for policies that support small farmers and rural communities. They argue that agriculture is a crucial sector of the economy and that a more equitable distribution of land and resources is necessary to achieve social justice and economic equality."
 democratic_socialism:0 "Democratic Socialist"
 democratic_socialism_noun:0 "Democratic Socialism"
 democratic_socialism_desc:0 "Democratic Socialism is a socialist ideology that emphasizes reformist and democratic means to achieve socialism and a egalitarian society."
 socialism:0 "Socialist"
 socialism_noun:0 "Socialism"
 socialism_desc:0 "Socialism is a political and economic ideology that advocates for the collective ownership and control of the means of production and distribution of goods. It emphasizes the importance of social welfare, economic equality, and the reduction of class distinctions."
 progressive_conservatism:0 "Progressive Conservative"
 progressive_conservatism_noun:0 "Progressive Conservatism"
 progressive_conservatism_desc:0 "Progressive Conservatism is a political ideology that combines elements of conservatism and progressivism. It emphasizes the importance of tradition and stability, while also advocating for social and economic reforms to address social inequalities and promote economic growth. Progressive Conservatives believe in a strong central government that can effectively implement policies to benefit the working class and reduce the influence of wealthy elites, while also preserving traditional values and institutions."
 progressive_liberalism:0 "Progressive Liberal"
 progressive_liberalism_noun:0 "Progressive Liberalism"
 progressive_liberalism_desc:0 "Progressive Liberalism is a political ideology that combines elements of liberalism and progressivism. It emphasizes the importance of individual freedom and social justice, while also advocating for social and economic reforms to address social inequalities and promote economic growth. Progressive Liberals believe in a government that actively works to protect individual rights and promote social welfare, while also encouraging economic innovation and personal responsibility."
 wilsonianism:0 "Wilsonian"
 wilsonianism_noun:0 "Wilsonianism"
 wilsonianism_desc:0 "Wilsonianism is a political ideology based on the ideas and policies of Woodrow Wilson. It emphasizes the importance of international cooperation, democracy, and self-determination, while also advocating for economic interventionism and social welfare policies to address social inequalities and promote economic growth. Wilsonians believe in a strong central government that can effectively implement policies to benefit the working class and reduce the influence of wealthy elites, while also promoting American values and interests on the global stage."
 roosevelt_progressivism:0 "Bull Moose Progressive"
 roosevelt_progressivism_noun:0 "Bull Moose Progressivism"
 roosevelt_progressivism_desc:0 "Bull Moose Progressivism is a political ideology based on the ideas and policies of Theodore Roosevelt. It emphasizes the importance of social justice, economic reform, and environmental conservation, while also advocating for a strong central government to implement these policies. Bull Moose Progressives believe in a government that actively works to protect the rights of workers and consumers, while also promoting economic growth and innovation."
 reformist_syndicalism_prog:0 "Reformist Syndicalist"
 reformist_syndicalism_prog_noun:0 "Reformist Syndicalism"
 reformist_syndicalism_prog_desc:0 "Reformist Syndicalism is a political ideology that combines elements of syndicalism and reformism. It emphasizes the role of labor unions and workers' organizations in advocating for reforms within the capitalist system, rather than seeking to overthrow it through revolution. Reformist Syndicalists believe that the working class can achieve better conditions and greater control over their labor through collective bargaining and political activism, rather than through direct action and self-management. They advocate for a more gradual transition to socialism, rather than an immediate establishment of a stateless, classless society."
 constitutional_monarchism_prog:0 "Constitutional Monarchist"
 constitutional_monarchism_prog_noun:0 "Constitutional Monarchism"
 constitutional_monarchism_prog_desc:0 "Under the control of the progressives, the monarchy is preserved but limited by a constitution that guarantees individual rights and freedoms. The monarch serves as merely a symbolic figurehead, while the government is run by elected officials who are accountable to the people. This ideology emphasizes the importance of tradition and stability, while also advocating for social and economic reforms to address social inequalities and promote economic growth."
 evolutionary_socialism:0 "Evolutionary Socialist"
 evolutionary_socialism_noun:0 "Evolutionary Socialism"
 evolutionary_socialism_desc:0 "Evolutionary Socialism is a political ideology better known today as social democracy. It emphasizes the importance of achieving socialism through gradual reforms and democratic processes, rather than through revolution. Evolutionary Socialists believe that the working class can achieve better conditions and greater control over their labor through collective bargaining, political activism, and social welfare policies, while also advocating for a strong central government to implement these reforms. They argue that a more equitable distribution of wealth and resources is necessary to achieve social justice and economic equality, while also recognizing the importance of individual freedoms and market mechanisms in promoting economic growth and innovation."
 "FACTION_NAME_PROGRESSIVISM_1":0 "Progressive Alliance"
 #LIBERALISM
 liberalism:0 "Liberal"
 liberalism_noun:0 "Liberalism"
 liberalism_desc:0 "Democratic State"
 classical_liberalism:0 "Classical Liberal"
 classical_liberalism_noun:0 "Classical Liberalism"
 classical_liberalism_desc:0 "Classical Liberalism is a political ideology that emphasizes individual freedom, limited government, and free markets. It advocates for a society where individuals are free to pursue their own interests and goals, while also recognizing the importance of protecting individual rights and promoting social welfare."
 social_liberalism:0 "Social Liberal"
 social_liberalism_noun:0 "Social Liberalism"
 social_liberalism_desc:0 "Social Liberalism is a political ideology that seeks to balance individual liberty with social justice. It emphasizes the need for government intervention to address social inequalities and provide a safety net for the disadvantaged, while also protecting individual rights and promoting economic freedom."
 market_liberalism:0 "Market Liberal"
 market_liberalism_noun:0 "Market Liberalism"
 market_liberalism_desc:0 "Market Liberalism is a political ideology that emphasizes the importance of free markets and limited government intervention in the economy. It advocates for a society where individuals and businesses are free to pursue their economic interests, while also recognizing the need for some regulation to ensure fair competition and protect consumers."
 liberal_internationalism:0 "Liberal Internationalist"
 liberal_internationalism_noun:0 "Liberal Internationalism"
 liberal_internationalism_desc:0 "Liberal Internationalism is a political ideology that emphasizes the importance of international cooperation, diplomacy, and the promotion of democratic values and human rights across the globe. It advocates for a world where nations work together to address global challenges and promote peace and stability."
 national_liberalism:0 "National Liberal"
 national_liberalism_noun:0 "National Liberalism"
 national_liberalism_desc:0 "National Liberalism is a political ideology that combines elements of nationalism and liberalism. It emphasizes the importance of national identity and unity, while also advocating for individual freedom, limited government, and free markets. National Liberals believe in a society where individuals are free to pursue their own interests and goals, while also recognizing the importance of protecting individual rights and promoting social welfare within the context of a strong national identity."
 wilsonianism_lib:0 "Wilsonian Progressive"
 wilsonianism_lib_noun:0 "Wilsonian Progressivism"
 wilsonianism_lib_desc:0 "Wilsonian Progressivism is a political ideology based on the ideas and policies of Woodrow Wilson. It emphasizes the importance of international cooperation, democracy, and self-determination, while also advocating for economic interventionism and social welfare policies to address social inequalities and promote economic growth. Wilsonian Progressives believe in a strong central government that can effectively implement policies to benefit the working class and reduce the influence of wealthy elites, while also promoting American values and interests on the global stage."
 constitutional_monarchism_lib:0 "Constitutional Monarchist"
 constitutional_monarchism_lib_noun:0 "Constitutional Monarchism"
 constitutional_monarchism_lib_desc:0 "Constitutional Monarchism is a political ideology that advocates for a system of government in which a monarch acts as the head of state within the parameters of a constitution. It emphasizes the importance of maintaining a balance between the authority of the monarchy and the rights of citizens, ensuring that the government operates under the rule of law while preserving traditional institutions and values."
