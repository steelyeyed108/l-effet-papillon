 despotism:0 "Despotic"
 despotism_noun:0 "Despotism"
 despotism_desc:0 "Authoritarian State"
 occidental_despotism:0 "Occidental Despotic"
 occidental_despotism_noun:0 "Occidental Despotism"
 occidental_despotism_desc:0 "Occidental Despotism is a more recent European-cultured reaction to the idea of violent Leftist ideologies such as fascism and communism, as well as violent right wing ideologies such as Revolutionarism, that embodies national character. It can very from a temporary military autocracy to a Personalist dictatorship. It also usually roots itself in old European cultures rather than newer ones. It is similar to Oriental Despotism."
