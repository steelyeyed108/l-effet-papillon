 #CONSERVATISM
 conservatism:0 "Conservative"
 conservatism_noun:0 "Conservatism"
 conservatism_desc:0 "Democratic State"
 traditional_conservatism:0 "Traditional Conservative"
 traditional_conservatism_noun:0 "Traditional Conservatism"
 traditional_conservatism_desc:0 "Traditional Conservatism is a political ideology that emphasizes the importance of preserving traditional institutions, values, and social hierarchies. It advocates for a society that maintains continuity with the past and resists rapid change, while also recognizing the need for some degree of reform to address social issues and promote economic growth."
 social_conservatism:0 "Social Conservative"
 social_conservatism_noun:0 "Social Conservatism"
 social_conservatism_desc:0 "Social Conservatism is a political ideology that emphasizes the importance of traditional social values and institutions, such as family, religion, and community. It advocates for a society that upholds these values and resists cultural changes that are seen as threatening to the social fabric."
 national_conservatism:0 "National Conservative"
 national_conservatism_noun:0 "National Conservatism"
 national_conservatism_desc:0 "National Conservatism is a political ideology that combines elements of nationalism and conservatism. It emphasizes the importance of national identity and unity, while also advocating for the preservation of traditional values and institutions. National Conservatives believe in a society that maintains continuity with the past and resists rapid change, while also promoting a strong national identity and protecting the interests of the nation."
 red_conservatism_con:0 "Red Conservative"
 red_conservatism_con_noun:0 "Red Conservatism"
 red_conservatism_con_desc:0 "Red Conservatism is a political ideology that combines elements of socialism and conservatism. It emphasizes the importance of social justice and economic equality, while also advocating for the preservation of traditional values and institutions. Red Conservatives believe in a society that maintains continuity with the past and resists rapid change, while also promoting social welfare and protecting the interests of the working class."
 progressive_conservatism_con:0 "Progressive Conservative"
 progressive_conservatism_con_noun:0 "Progressive Conservatism"
 progressive_conservatism_con_desc:0 "Progressive Conservatism is a political ideology that combines elements of progressivism and conservatism. It emphasizes the importance of social reform and modernization, while also advocating for the preservation of traditional values and institutions. Progressive Conservatives believe in a society that adapts to changing circumstances and promotes social welfare, while maintaining continuity with the past."
 roosevelt_progressivism_con:0 "Bull Moose Progressive"
 roosevelt_progressivism_con_noun:0 "Bull Moose Progressivism"
 roosevelt_progressivism_con_desc:0 "Bull Moose Progressivism is a political ideology associated with the Progressive Party led by Theodore Roosevelt. It emphasizes the importance of social reform, modernization, and active government intervention in the economy, while also advocating for the preservation of certain traditional values and institutions."
 volkish_conservatism:0 "Volkish Conservative"
 volkish_conservatism_noun:0 "Volkish Conservatism"
 volkish_conservatism_desc:0 "Volkish Conservatism is a political ideology that combines elements of nationalism and conservatism, with a specific focus on promoting the interests and values of the Volk, or the people. It emphasizes the importance of national identity, cultural heritage, and traditional values, while also advocating for policies that protect the interests of the nation and its people. Volkish Conservatives believe in a society that maintains continuity with the past and resists rapid change, while also promoting a strong national identity and protecting the interests of the nation."
 constitutional_monarchism_con:0 "Constitutional Monarchist"
 constitutional_monarchism_con_noun:0 "Constitutional Monarchism"
 constitutional_monarchism_con_desc:0 "Constitutional Monarchism is a political ideology that advocates for a system of government in which a monarch acts as the head of state within the parameters of a constitution. It emphasizes the importance of maintaining a balance between the authority of the monarchy and the rights of citizens, ensuring that the government operates under the rule of law while preserving traditional institutions and values."
 catholic_conservatism:0 "Catholic Conservative"
 catholic_conservatism_noun:0 "Catholic Conservatism"
 catholic_conservatism_desc:0 "Catholic Conservatism is a political ideology that combines elements of conservatism and Catholicism. It emphasizes the importance of traditional values and institutions, while also advocating for policies that align with Catholic teachings on social and moral issues. Catholic Conservatives believe in a society that maintains continuity with the past and resists rapid change, while also promoting social welfare and protecting the interests of the working class in accordance with Catholic social teaching."
