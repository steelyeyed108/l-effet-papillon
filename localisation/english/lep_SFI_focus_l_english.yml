l_english:
 SFI_a_nation_in_crisis:0 "A Nation in Crisis"
 SFI_a_nation_in_crisis_desc:0 "After the fall of the former republic, the country is in a state of chaos. The government is in disarray, and the people are desperate for a solution. Now in civil war, the syndicalists, mussolinists, national syndicalists, liberals, and mafia are all vying for control of the country. The future of Italy is uncertain, and the people of Italy are ready to fight for their vision of the future."
 SFI_sieze_the_airways:0 "Sieze the Airways"
 SFI_sieze_the_airways_desc:0 "Controlling the radio is crucial in a civil war. It allows us to spread our message and gain support from the people. By taking control of the airwaves, we can also disrupt the communication of our enemies and gain an advantage in the fight for Italy's future."
 SFI_emergency_popular_comittees:0 "Emergency Popular Committees"
 SFI_emergency_popular_comittees_desc:0 "In these times of crisis, we need to mobilize the people and create a network of support. By establishing emergency popular committees, we can organize the people and gain their support for our cause. These committees will help us to spread our message and gain the support we need to win the civil war."
 SFI_break_the_old_parties:0 "Break the Old Parties"
 SFI_break_the_old_parties_desc:0 "The old parties have failed us, and they are no longer relevant in this new Italy. We need to break them down and create a new political landscape that reflects the will of the people. By doing so, we can create a new Italy that is stronger and more united than ever before."
 SFI_rally_the_oppressed:0 "Rally the Oppressed"
 SFI_rally_the_oppressed_desc:0 "The people of Italy are suffering, and they are looking for a leader to rally behind. By rallying these people, we can gain their support and create a powerful movement that can change the course of the civil war. We need to show the people that we are fighting for them and that we have a vision for a better future."
 SFI_popular_front_cw:0 "Popular Front"
 SFI_popular_front_cw_desc:0 "The Popular Front is a coalition of left-wing parties that have come together to fight against the more extreme factions. With a strong sense of nationalism, and still a commitment to the common worker, the Popular Front is a powerful force for the Surreal Federation of Italy."
 SFI_honor_the_arditi_legacy:0 "Honor the Arditi Legacy"
 SFI_honor_the_arditi_legacy_desc:0 "The Arditi were the elite shock troops of the Italian army during World War I. They were known for their bravery and their willingness to take on the most dangerous missions. By honoring their legacy, we can inspire our troops and show the people that we are committed to fighting for Italy's future, while also showing we care for our veterans and the sacrifices they made for Italy."
 SFI_promise_land_reform:0 "Promise Land Reform"
 SFI_promise_land_reform_desc:0 "Land reform is a crucial issue in Italy. Many people are struggling to make a living from the land, and they are looking for a solution. By promising land reform, we can gain the support of the rural population and show them that we are committed to improving their lives. This will also help us to gain support from the working class, who are also struggling to make ends meet."
 SFI_increased_workers_rights:0 "Increased Workers' Rights"
 SFI_increased_workers_rights_desc:0 "The working class is the backbone of our country, and they deserve to have their rights protected. By increasing workers' rights, we can gain the support of the working class and show them that we are committed to improving their lives. This will also help us to gain support from the rural population, who are also struggling to make a living from the land."
 SFI_italy_for_all_italians:0 "Italy for All Italians"
 SFI_italy_for_all_italians_desc:0 "Italy is a country that belongs to all Italians, regardless of their political beliefs, background, or social status. By promoting the idea of Italy for all Italians, we can gain the support of a wide range of people and show them that we are committed to creating a better future for everyone. This will also help us to gain support from the middle class, who are often caught in the middle of the political struggle."
 SFI_crush_internal_elites:0 "Crush Internal Elites"
 SFI_crush_internal_elites_desc:0 "The internal elites have been a major obstacle to progress in Italy. They have been more interested in maintaining their own power and wealth than in improving the lives of the people. By crushing these internal elites, we can gain the support of the people and show them that we are committed to creating a better future for everyone. This will also help us to gain support from the working class, who are often exploited by these elites."
 SFI_universal_sufferage_in_arms:0 "Universal Suffrage in Arms"
 SFI_universal_sufferage_in_arms_desc:0 "In a time of civil war, it is crucial to have the support of the people. By granting universal suffrage in arms, we can show the people that we are committed to fighting for their rights and their future. This will also help us to gain support from a wide range of people, including those who may not have been politically active before."
 SFI_create peoples_assembelies:0 "Create People's Assemblies"
 SFI_create_peoples_assembelies_desc:0 "The people of Italy need to have a say in how their country is run. By creating people's assemblies, we can give the people a voice and show them that we are committed to creating a more democratic and inclusive Italy. This will also help us to gain support from a wide range of people, including those who may not have been politically active before."
 SFI_a_free_italy:0 "A Free Italy"
 SFI_a_free_italy_desc:0 " "
 SFI_empower_the_military:0 "Empower the Military"
 SFI_empower_the_military_desc:0 "The military is a crucial institution in any country, and it is especially important in a time of civil war. By empowering the military, we can show the people that we are committed to defending Italy and its future. This will also help us to gain support from the military, who are often a powerful force in Italian politics."
 SFI_purge_extremist_squads:0 "Purge Extremist Squads"
 SFI_purge_extremist_squads_desc:0 "The blackshirts, even the moderate ones, are still an enemy of our young republic. By purging these extremist squads, we can show the people that we are committed to creating a more inclusive and democratic Italy. This will also help us to gain support from a wide range of people, including those who may have been sympathetic to the blackshirts in the past. Yet, we also risk losing elites squads that could win us the civil war."
 SFI_integrate_the_moderate_blackshirts:0 "Integrate the Moderate Blackshirts"
 SFI_integrate_the_moderate_blackshirts_desc:0 "Eventhough the blackshirts are an enemy of our republic, we cannot ignore the fact that many of them are competent soliders and valuable allies in the fight for Italy's future. By allowing the moderate blackshirts to integrate into our military, we can gain elite forces that may help us win the civil war. Yet, we also risk losing support from the common man in our republic, who may see this as a betrayal of our ideals."
 SFI_the_republic_over_all:0 "The Republic Over All"
 SFI_the_republic_over_all_desc:0 "The republic is the foundation of our country, and it must be protected at all costs. By prioritizing the republic over all else, we will have a loyal populace and a loyal military that will fight for our vision of Italy."
 SFI_an_army_to_serve_the_nation:0 "An Army to Serve the Nation"
 SFI_an_army_to_serve_the_nation_desc:0 "Since the military is a powerful institution in our politics, we need to ensure it is loyal to our republic and our ideals. By creating an army that serves the nation, we can ensure that our military is committed to defending Italy and its future, rather than serving the interests of themselves."
 SFI_an_oath_to_the_people:0 "An Oath to the People"
 SFI_an_oath_to_the_people_desc:0 "The oath to the people is a powerful way to show the populace that the military and government are committed to serving the people and their interests, rather than their own."
 SFI_emergency_wartime_parliament:0 "Emergency Wartime Parliament"
 SFI_emergency_wartime_parliament_desc:0 "In a time of civil war, it is crucial to have a functioning government that can make decisions and lead the country. By creating an emergency wartime parliament, we can ensure that the government is able to function effectively and make the necessary decisions to win the civil war and create a better future for Italy."
 SFI_limit_civil_liberties:0 "Limit Civil Liberties" 
 SFI_limit_civil_liberties_desc:0 "The common man cannot make every decision for themself in a time of war. By limiting civil liberties, we can ensure that the government has the power to make the necessary decisions to win the civil war and create our vision of Italy's future."
 SFI_the_armed_republic:0 "The Armed Republic"
 SFI_the_armed_republic_desc:0 "With the military empowered and now a part of our republic, we can make sure that Italy is protected from both internal and external threats."
 SFI_secure_northern_industry:0 "Secure Northern Industry"
 SFI_secure_northern_industry_desc:0 "The industrial heartland of Italy is in the north, and it is crucial to our war effort. By securing the northern industry, we can ensure that we have the resources we need to win the civil war and create our vision for Italy."
 SFI_control_the_railways:0 "Control the Railways"
 SFI_control_the_railways_desc:0 "The railways are a crucial part of our infrastructure, and they are essential for moving troops and supplies around the country. By controlling the railways, we can ensure that transportation is efficient and that we will have the resources we need to create our vision for Italy."
 SFI_march_on_rome:0 "March on Rome"
 SFI_march_on_rome_desc:0 "We must take rome, the heart of Italy, to show the world that we are the true rulers of Italy and that our vision for the future is the one that will prevail. By marching on Rome, we will be able to gain the support of other nations, and be able to gain access to the largest italian city, which will be crucial for our republic's survival."
 SFI_victory_of_the_republic:0 "Victory of the Republic"
 SFI_victory_of_the_republic_desc:0 "With the fall of our enemies, the republic has won the civil war and is now the undisputed ruler of Italy. This will allow us to create our vision for Italy's future and ensure that the country is on the path to prosperity and stability for the common man."
 SFI_the_italian_army:0 "The Italian Army"
 SFI_the_italian_army_desc:0 "Our army is extremely disorganized. We need to have a clear vision for how we will organize and structure our military forces to ensure that we can effectively fight for Italy's future. By creating a clear structure for our army, we can ensure that our troops are well-trained and well-equipped, and that they are able to effectively fight for our vision of Italy's future."
 SFI_merge_army_and_nation:0 "Merge Army and Nation"
 SFI_merge_army_and_nation_desc:0 "The military must be loyal to the republic, and that means all soldiers must be, too. By merging the army and the republic, we can make sure that our military is fully committed to our nation and our vision for Italy's future."
 SFI_allow_minority_enlisting:0 "Allow Minority Enlisting"
 SFI_allow_minority_enlisting_desc:0 "In a time of civil war, we must make sure we have as many soldiers as possible. By allowing minorities to enlist in our military, we can increase our numbers and show our enemies we are a formidable force. This will also help us to gain support from minority groups, who may see this as a sign that we are committed to creating a more inclusive and democratic Italy."
 SFI_establish_the_citizen_soldiers_of_italy:0 "Establish the Citizen Soldiers of Italy"
 SFI_establish_the_citizen_soldiers_of_italy_desc:0 "The citizen soldiers of Italy will be a powerful force in our fight for Italy's future. By establishing this force, we can make sure that every citizen can fight for the republic."
 SFI_the_peoples_army:0 "The People's Army"
 SFI_the_peoples_army_desc:0 "The army should be a reflection of the people it serves. By making sure that the army is for the common man, we can separate ourselves from the corrupt old republic."
 SFI_a_democratic_doctrine:0 "A Democratic Doctrine"
 SFI_a_democratic_doctrine_desc:0 "Our doctrine should reflect our ideals. By creating a democratic doctrine, we can ensure that our military is committed to fighting for the common man and his vision for Italy's future, rather than for the interests of the elites."
 SFI_officers_answer_to_parliament:0 "Officers Answer to Parliament"
 SFI_officers_answer_to_parliament_desc:0 "In a true democracy, the military should be accountable to the people. By making sure that our officers answer to parliament, we can ensure that our military is committed to serving the people and their interests, rather than their own."
 SFI_oversee_the_military:0 "Oversee the Military"
 SFI_oversee_the_military_desc:0 "The military is a powerful institution, and it is crucial that we have oversight over it to ensure that it is serving the interests of the people and the republic. By overseeing the military, we can ensure that it is committed to fighting for our vision of Italy's future and that it is not being used for the interests of a select few, unlike the old republic."
 SFI_recognize_local_militias:0 "Recognize Local Militias"
 SFI_recognize_local_militias_desc:0 "Our current manpower consists of many local militias that have formed in response to the chaos and our cause. By recognizing these militas, we can show that the military is for the people and that everyone has a say."
 SFI_regional_defense_command:0 "Regional Defense Command"
 SFI_regional_defense_command_desc:0 "Italy is a country with many different regions, and it is crucial that we have a military structure that reflects this. By creating a regional defense command, we can ensure that our military is able to effectively defend the different regions of Italy and that it is able to respond quickly to any threats that may arise, tailored to the specific needs of each region."
 SFI_a_decentralized_model:0 "A Decentralized Model"
 SFI_a_decentralized_model_desc:0 "Following our ideals, we must ensure that our military is not a tool of the elites, but rather a reflection of the people. By creating a decentralized model for our military, we can ensure that it is more democratic and inclusive, and that it is able to effectively fight for our vision of Italy's future."
 SFI_professionalize_the_officer_corps:0 "Professionalize the Officer Corps"
 SFI_professionalize_the_officer_corps_desc:0 "The officer corps is a crucial part of our military, and it is important that we have a professional and competent group of officers leading our troops. By professionalizing the officer corps, we can ensure that our military is well-led and that our troops are able to effectively fight for our vision of Italy's future."
 SFI_enforce_service:0 "Enforce Service"
 SFI_enforce_service_desc:0 "In a time of civil war, we need as many soldiers as we can get. By enforcing service, we can ensure that we have the manpower we need to win the civil war and create our visionfor Italy."
 SFI_purge_militas:0 "Purge Militias"
 SFI_purge_militas_desc:0 "The Militas, while initially helpful, have become a liability. They are disorganized and undisciplined, and they are not effective in their fighting. We must prevent the creation and growth of these militias to ensure that our military is effective and able enough to win the civil war."
 SFI_a_modern_war_doctrine:0 "A Modern War Doctrine"
 SFI_a_modern_war_doctrine_desc:0 "The world is changing, and so is warfare. By ensuring our military has a modern war doctrine, we can ensure that we are prepared for the challenges of modern warfare and that we are able to effectively fight for our vision of Italy's future."
 SFI_scientific_war_doctrine:0 "Scientific War Doctrine"
 SFI_scientific_war_doctrine_desc:0 "By adopting a scientific approach to our war doctrine, we can ensure that we are using the most effective strategies and tactics in our fight for Italy's future. This will allow us to gain an advantage over our enemies and increase our chances of winning the civil war."
 SFI_expand_war_colleges:0 "Expand War Colleges"
 SFI_expand_war_colleges_desc:0 "War colleges are crucial for training our military leaders and ensuring that they are well-prepared for the challenges of modern warfare. We can also ensure our scientific and modern doctrines are up to date. By expanding our war colleges, we can ensure that we have a steady stream of competent and professional officers leading our troops in the fight for Italy."
 SFI_an_elite_force:0 "An Elite Force"
 SFI_an_elite_force_desc:0 "Elite forces can be a powerful tool in any war. By creating an elite force, we can ensure that we have a group of highly trained and well-equipped soldiers who can take on the most dangerous missions and help us to win the civil war and create our vision for Italy's future."
 SFI_create_the_special_forces:0 "Create the Special Forces"
 SFI_create_the_special_forces_desc:0 "The special forces are to be the most elite of our elite forces. They will be trained to take on the most dangerous and difficult missions, and possibly be the reason we win the civil war."
 SFI_a_modern_model:0 "A Modern Model"
 SFI_a_modern_model_desc:0 "With our creation of a modern and scientific war doctrine, we need to ensure our military is structured in a way that allows us to effectively implement this doctrine and keep it up to date."
 SFI_an_army_fit_for_italy:0 "An Army Fit for Italy"
 SFI_an_army_fit_for_italy_desc:0 "By creating an army that is reflective of Italy and its people, we can ensure that our military represents the values and ideals of our country and that it is able to effectively fight for Italy's future."