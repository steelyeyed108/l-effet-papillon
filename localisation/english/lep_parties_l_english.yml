 luxemburgism:0 "Luxemburgism"
 luxemburgism_desc:0 "Luxemburgism is a political ideology based on the ideas of Rosa Luxemburg, a Marxist theorist and revolutionary. It emphasizes the importance of mass action and spontaneous uprisings by the working class to achieve socialism. Luxemburgists criticize the idea of a vanguard party and instead advocate for a more democratic and decentralized approach to revolution. They believe that the working class should have direct control over the means of production and that the state should be abolished in favor of a stateless, classless society. Luxemburgism also emphasizes the importance of international solidarity and the need for workers around the world to unite in their struggle against capitalism."
