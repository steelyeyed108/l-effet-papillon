l_english:
improving_workers_rights: "Improving Workers' Rights"
mod_event.1.t: "Improving Workers' Rights"
mod_event.1.d: "The government has announced a new initiative to improve workers' rights in the country. This includes measures to increase the minimum wage, enhance workplace safety regulations, and provide better protections for gig economy workers. The initiative aims to create a more equitable and fair working environment for all citizens."
mod_event.1.a: "Onward to a better future for workers!"